name: Cek Form ADEPT

on:
  schedule:
    # Cadangan tipis-tipis kalau-kalau scheduler internal GitHub hidup lagi - aman
    # didobel krn hasilnya idempotent (state sudah sama, tidak akan re-notif).
    # SENGAJA TIDAK ADA jadwal khusus utk ringkasan harian di sini: scheduler internal
    # GitHub terbukti bisa telat berjam-jam (lihat commit riwayat), yang kalau dipakai
    # utk trigger ringkasan bikin pesan dobel di jam acak. Ringkasan harian sepenuhnya
    # diserahkan ke cron-job.org (job "morning"/"afternoon") yg presisi lewat force_digest.
    - cron: "6,21,36,51 * * * *"   # tiap 15 menit (offset 6 menit dari jam bulat)
  workflow_dispatch:          # tombol jalankan manual di tab Actions / dipanggil cron-job.org
    inputs:
      force_digest:
        description: "Paksa kirim ringkasan harian (buat testing)"
        type: boolean
        default: false

permissions:
  contents: write             # agar bisa commit balik file state

jobs:
  cek:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependensi
        run: pip install requests

      - name: Jalankan pengecekan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          IS_DAILY_DIGEST: ${{ github.event.inputs.force_digest == 'true' && 'true' || 'false' }}
        run: python adept_check.py

      - name: Simpan perubahan state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add adept_state.json
          git commit -m "update state ADEPT" || echo "tidak ada perubahan"
          git push || echo "tidak ada yang di-push"

