name: Cek Form ADEPT

on:
  schedule:
    # Menit sengaja digeser dari :00/:15/:30/:45 - itu titik tersibuk di seluruh
    # GitHub Actions dan cron sering telat/di-skip total kalau jatuh persis di situ.
    - cron: "6,21,36,51 * * * *"   # tiap 15 menit (offset 6 menit dari jam bulat)
    - cron: "6 23 * * *"           # ringkasan harian pagi: 23:06 UTC = 06:06 WIB
    - cron: "6 11 * * *"           # ringkasan harian sore: 11:06 UTC = 18:06 WIB
  workflow_dispatch:          # tombol jalankan manual di tab Actions
    inputs:
      force_digest:
        description: "Paksa kirim ringkasan harian (buat testing)"
        type: boolean
        default: false

permissions:
  contents: write             # agar bisa commit balik file state

jobs:
  cek:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependensi
        run: pip install requests

      - name: Jalankan pengecekan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          IS_DAILY_DIGEST: ${{ (github.event.schedule == '6 23 * * *' || github.event.schedule == '6 11 * * *' || github.event.inputs.force_digest == 'true') && 'true' || 'false' }}
        run: python adept_check.py

      - name: Simpan perubahan state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add adept_state.json
          git commit -m "update state ADEPT" || echo "tidak ada perubahan"
          git push || echo "tidak ada yang di-push"

