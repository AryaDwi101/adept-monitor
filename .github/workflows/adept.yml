name: Cek Form ADEPT

on:
  schedule:
    - cron: "*/15 * * * *"   # tiap 15 menit (waktu UTC; jeda bisa molor saat GitHub sibuk)
    - cron: "0 23 * * *"     # ringkasan harian: 23:00 UTC = 06:00 WIB
  workflow_dispatch:          # tombol jalankan manual di tab Actions
    inputs:
      force_digest:
        description: "Paksa kirim ringkasan harian (buat testing)"
        type: boolean
        default: false

permissions:
  contents: write             # agar bisa commit balik file state

jobs:
  cek:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependensi
        run: pip install requests

      - name: Jalankan pengecekan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          IS_DAILY_DIGEST: ${{ (github.event.schedule == '0 23 * * *' || github.event.inputs.force_digest == 'true') && 'true' || 'false' }}
        run: python adept_check.py

      - name: Simpan perubahan state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add adept_state.json
          git commit -m "update state ADEPT" || echo "tidak ada perubahan"
          git push || echo "tidak ada yang di-push"

